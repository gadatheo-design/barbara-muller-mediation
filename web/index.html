<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="Mobile mediation experience around three abstract paintings by Barbara Muller."
    />
    <title>Barbara Muller Mediation</title>
    <link rel="stylesheet" href="./style.css?v=20260506" />
  </head>
  <body>
    <a class="skip-link" href="#sheet">Skip to guidance</a>

    <div id="app">
      <div id="canvas-shell" aria-hidden="true"></div>

      <header class="topbar" aria-label="Visitor controls">
        <div class="topbar-group">
          <button
            id="lang-button"
            class="chip-button"
            type="button"
            aria-label="Change language"
          >
            FR
          </button>
          <button
            id="summary-button"
            class="chip-button chip-button-wide"
            type="button"
            aria-controls="summary-panel"
            aria-expanded="false"
            aria-label="Open session summary"
          >
            Session
          </button>
        </div>

        <div class="topbar-group">
          <button
            id="mark-looking-button"
            class="chip-button chip-button-wide"
            type="button"
            aria-controls="sheet"
            aria-expanded="false"
            aria-label="Mark looking"
          >
            Mark looking
          </button>
        </div>
      </header>

      <aside
        id="summary-panel"
        class="summary-panel is-hidden"
        role="region"
        aria-live="polite"
        aria-label="Session summary"
      ></aside>

      <main class="experience-shell" aria-label="Museum mediation experience">
        <section id="sheet" class="sheet" aria-live="polite" aria-labelledby="sheet-title">
          <div class="progress-block">
            <div class="progress-meta">
              <p id="sheet-step" class="sheet-step"></p>
              <p id="sheet-progress-label" class="sheet-progress-label"></p>
            </div>
            <div class="progress-track" aria-hidden="true">
              <span id="progress-fill" class="progress-fill"></span>
            </div>
            <div id="progress-notes" class="progress-notes" aria-hidden="true"></div>
          </div>

          <div id="sheet-context" class="sheet-context" aria-live="polite"></div>
          <h1 id="sheet-title" class="sheet-title"></h1>
          <p id="sheet-copy" class="sheet-copy"></p>
          <p id="sheet-hint" class="sheet-hint"></p>

          <div id="controls" class="controls"></div>
          <p id="privacy-note" class="privacy-note"></p>
        </section>
      </main>

      <section
        id="modal"
        class="modal is-hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        aria-live="polite"
        aria-label="Final phrase"
      ></section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js" defer></script>
    <script src="./sketch.js?v=20260506" defer></script>
    <script>
      (() => {
        const fallbackCopy = {
          fr: {
            step: "Chargement",
            title: "Chargement incomplet",
            copy: "Le prototype n’a pas pu charger p5.js. Vérifiez la connexion réseau puis rechargez la page.",
            hint: "La version web reste statique et ne transmet aucune donnée.",
            session: "Session",
            sessionAria: "Résumé de séance indisponible",
            markLooking: "Marquer le regard",
            markLookingAria: "Marquage du regard indisponible",
            topbarAria: "Commandes visiteur",
            privacy:
              "Ce prototype stocke les données uniquement localement dans cette session du navigateur. Aucun nom, e-mail, IP ou donnée personnelle n’est collecté.",
          },
          de: {
            step: "Laden",
            title: "Unvollständiges Laden",
            copy: "Der Prototyp konnte p5.js nicht laden. Prüfen Sie die Netzwerkverbindung und laden Sie die Seite neu.",
            hint: "Die Webversion bleibt statisch und überträgt keine Daten.",
            session: "Sitzung",
            sessionAria: "Sitzungsübersicht nicht verfügbar",
            markLooking: "Blick markieren",
            markLookingAria: "Blickmarkierung nicht verfügbar",
            topbarAria: "Besuchersteuerung",
            privacy:
              "Dieser Prototyp speichert Daten nur lokal in dieser Browser-Sitzung. Es werden keine Namen, E-Mails, IP-Adressen oder persönlichen Daten erhoben.",
          },
          en: {
            step: "Loading",
            title: "Incomplete load",
            copy: "The prototype could not load p5.js. Check the network connection, then reload the page.",
            hint: "The web version stays static and does not transmit data.",
            session: "Session",
            sessionAria: "Session summary unavailable",
            markLooking: "Mark looking",
            markLookingAria: "Look-marking unavailable",
            topbarAria: "Visitor controls",
            privacy:
              "This prototype stores data only locally in this browser session. No names, emails, IPs, or personal data are collected.",
          },
        };

        window.addEventListener("load", () => {
          if (window.p5) return;

          const lang = (document.documentElement.lang || navigator.language || "en")
            .slice(0, 2)
            .toLowerCase();
          const text = fallbackCopy[lang] || fallbackCopy.en;

          document.documentElement.lang = lang;
          document.querySelector(".topbar")?.setAttribute("aria-label", text.topbarAria);
          document.getElementById("canvas-shell")?.setAttribute("hidden", "hidden");

          const step = document.getElementById("sheet-step");
          const progressLabel = document.getElementById("sheet-progress-label");
          const progressFill = document.getElementById("progress-fill");
          const progressNotes = document.getElementById("progress-notes");
          const title = document.getElementById("sheet-title");
          const copy = document.getElementById("sheet-copy");
          const hint = document.getElementById("sheet-hint");
          const context = document.getElementById("sheet-context");
          const controls = document.getElementById("controls");
          const privacy = document.getElementById("privacy-note");
          const summaryButton = document.getElementById("summary-button");
          const markLookingButton = document.getElementById("mark-looking-button");

          if (step) step.textContent = text.step;
          if (progressLabel) progressLabel.textContent = "";
          if (progressFill) progressFill.style.width = "0%";
          if (progressNotes) progressNotes.innerHTML = "";
          if (context) context.innerHTML = "";
          if (title) title.textContent = text.title;
          if (copy) copy.textContent = text.copy;
          if (hint) hint.textContent = text.hint;
          if (controls) {
            controls.innerHTML =
              '<div class="helper-card"><p class="helper-title">p5.js</p><p class="helper-copy">' +
              text.copy +
              "</p></div>";
          }
          if (privacy) {
            privacy.hidden = false;
            privacy.textContent = text.privacy;
          }

          if (summaryButton) {
            summaryButton.textContent = text.session;
            summaryButton.disabled = true;
            summaryButton.setAttribute("aria-label", text.sessionAria);
          }

          if (markLookingButton) {
            markLookingButton.textContent = text.markLooking;
            markLookingButton.disabled = true;
            markLookingButton.setAttribute("aria-label", text.markLookingAria);
          }
        });
      })();
    </script>
  </body>
</html>
